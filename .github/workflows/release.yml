name: Build dist files and release

on:
  workflow_dispatch:
    inputs:
      version:
        type: string
        description: Version for new release
        required: true
        default: 0.0.0

jobs:
  build:
    name: Build dist files and release
    runs-on: "ubuntu-latest"
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.4"

      - name: Validate release branch
        shell: bash
        run: |
          test "${GITHUB_REF_NAME}" = "master" || {
            echo "This workflow can only be run from master. Current ref: ${GITHUB_REF_NAME}"
            exit 1
          }

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun run test

      - name: Build dist files
        run: bun run build

      - name: Normalize generated wrapper permissions
        shell: bash
        run: |
          chmod +x dist/wrapper/index.js
          git update-index --chmod=+x dist/wrapper/index.js

      - name: Normalize generated file newlines
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          for file_name in ("dist/terraform/index.js", "dist/wrapper/index.js"):
              path = Path(file_name)
              data = path.read_bytes()
              if data and not data.endswith(b"\n"):
                  path.write_bytes(data + b"\n")
          PY

      - name: Verify generated files are committed
        shell: bash
        run: |
          if ! git diff --exit-code -- dist bun.lock; then
            echo "Generated files are out of date. Commit dist/ and bun.lock before releasing."
            echo
            echo "Generated diff:"
            git diff -- dist bun.lock || true
            exit 1
          fi

      - name: Fetch tags
        shell: bash
        run: git fetch --tags --force

      - name: Ensure release tag does not already exist
        shell: bash
        run: |
          if git rev-parse "v${{ github.event.inputs.version }}" >/dev/null 2>&1; then
            echo "Tag v${{ github.event.inputs.version }} already exists"
            exit 1
          fi

      - name: Create and push release tag
        shell: bash
        run: |
          git config --global user.email "github@scalr.com"
          git config --global user.name "Github Action"
          git tag -a "v${{ github.event.inputs.version }}" -m "Release v${{ github.event.inputs.version }}"
          git push origin "v${{ github.event.inputs.version }}"

      - name: Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ github.event.inputs.version }}" --generate-notes
