name: CI

on:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.11.1"
          cache: npm

      - name: Install dependencies
        run: npm clean-install

      - name: Run tests
        run: npm test
